server:
  port: 8083
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/OrderDB
    username: ${MYSQL_DB_USER}
    password: ${MYSQL_DB_PASSWORD}

  jpa:
    database: MYSQL
    show-sql: true
    hibernate:
      ddl-auto: update
      format-sql: true
      database-platform: org.hibernate.dialect.MySQLDialect